<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e60012">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="app-version" content="2026.07.22.9">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>老人用药记录</title>
<style>
:root{--red:#e60012;--redDark:#b9000e;--redSoft:#fff0f1;--ink:#171717;--muted:#6d6d73;--line:#e7e4e1;--bg:#f5f4f2;--card:#fff;--green:#168558;--greenSoft:#eaf8f1;--amber:#a56300;--amberSoft:#fff5df;--blue:#2764c6;--blueSoft:#eef4ff;--graySoft:#f1efed;--shadow:0 8px 28px rgba(20,20,20,.065);--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}.muted{color:var(--muted)}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(160deg,#fff 0,#fff 40%,#f8f4f2 100%)}.login-card{width:min(100%,420px);background:#fff;border-radius:28px;padding:28px 24px;box-shadow:0 24px 70px rgba(0,0,0,.11)}.logo{width:62px;height:62px;border-radius:20px;background:var(--red);color:#fff;display:grid;place-items:center;font-size:30px;font-weight:900}.login h1{font-size:28px;margin:20px 0}.password-wrap{position:relative}.password-wrap input{width:100%;height:56px;border:1.5px solid var(--line);border-radius:16px;padding:0 52px 0 16px;font-size:18px;outline:0}.password-wrap input:focus{border-color:var(--red);box-shadow:0 0 0 4px var(--redSoft)}.eye{position:absolute;right:6px;top:6px;width:44px;height:44px;border:0;background:transparent;border-radius:12px;font-size:20px}.login-button{width:100%;height:54px;border:0;border-radius:16px;background:var(--red);color:#fff;font-weight:850;font-size:17px;margin-top:14px}.login-error{min-height:22px;color:#b91c1c;margin-top:10px;font-size:13px}
.update-banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;width:min(calc(100% - 24px),680px);background:#111;color:#fff;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 38px rgba(0,0,0,.25)}.update-banner span{flex:1;font-size:13px}.update-banner button{border:0;background:#fff;color:#111;border-radius:10px;padding:8px 12px;font-weight:800}
.app{width:min(100%,720px);min-height:100vh;margin:auto;padding-bottom:calc(90px + var(--safe))}.top{position:sticky;top:0;z-index:20;background:rgba(245,244,242,.94);backdrop-filter:blur(18px);border-bottom:1px solid rgba(231,228,225,.86);padding:calc(10px + env(safe-area-inset-top,0px)) 14px 10px}.toprow{display:flex;align-items:center;gap:9px}.titlebox{min-width:0;flex:1}.small{font-size:12px;color:var(--muted)}.title{font-size:21px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.sync{border:0;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:800;white-space:nowrap}.sync{background:#ece9e6;color:#666}.sync.ok{background:var(--greenSoft);color:var(--green)}.sync.busy{background:var(--redSoft);color:var(--red)}.sync.bad{background:var(--amberSoft);color:var(--amber)}
main{padding:14px}.page{display:none}.page.active{display:block}.datebar{display:grid;grid-template-columns:48px 1fr 48px;align-items:center;margin-bottom:12px}.datebtn{height:46px;border:0;background:transparent;font-size:26px;color:#555}.datecenter{text-align:center}.datemain{font-size:17px;font-weight:850}.datesub{font-size:12px;color:var(--muted);margin-top:3px}
.now-card{background:#fff;border-radius:25px;padding:18px;box-shadow:var(--shadow);border:2px solid transparent}.now-card.overdue{border-color:#f2c5c9}.now-eyebrow{font-size:12px;color:var(--red);font-weight:900;letter-spacing:.04em}.now-title{font-size:24px;font-weight:950;line-height:1.25;margin-top:7px}.now-meta{margin-top:7px;color:#555;font-size:14px;line-height:1.55}.now-action{margin-top:15px;display:grid;grid-template-columns:1fr 112px;gap:9px}.now-done{height:54px;border:0;border-radius:16px;background:var(--red);color:#fff;font-size:17px;font-weight:900}.now-other{height:54px;border:1px solid var(--line);border-radius:16px;background:#fff;font-weight:800}.progress-strip{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:13px;padding:13px 14px;border-radius:16px;background:#f7f5f2}.progress-strip b{font-size:14px}.progress-strip span{font-size:12px;color:var(--muted)}.progress-number{font-size:17px!important;font-weight:900;color:var(--ink)!important}.alert{margin-top:12px;padding:13px 14px;border-radius:16px;background:#fff8e8;border:1px solid #f1dfb4;color:#714a00;font-size:13px;line-height:1.55}
.care{margin-top:12px;background:#fff;border-radius:20px;box-shadow:0 6px 20px rgba(20,20,20,.045);overflow:hidden}.care summary{list-style:none;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:900}.care summary::-webkit-details-marker{display:none}.care summary span{font-size:12px;color:var(--muted);font-weight:700}.care-body{padding:0 14px 14px;display:grid;gap:8px}.care-item{display:grid;grid-template-columns:30px 1fr;gap:9px;padding:10px 11px;border-radius:13px;background:#f8f6f4}.care-item b{font-size:13px}.care-item p{margin:3px 0 0;color:#57575b;font-size:12px;line-height:1.5}
.section-head{display:flex;justify-content:space-between;align-items:center;margin:22px 4px 10px}.section-head h3{margin:0;font-size:18px}.section-head span{font-size:12px;color:var(--muted)}.timegroup{margin-bottom:14px}.timelabel{display:flex;align-items:center;gap:7px;margin:0 5px 8px;font-size:12px;color:var(--muted);font-weight:800}.dot{width:7px;height:7px;border-radius:50%;background:var(--red)}.meds{display:grid;gap:9px}.med{background:#fff;border-radius:19px;padding:15px;box-shadow:0 6px 20px rgba(20,20,20,.045);border:1.5px solid transparent}.med.done{background:var(--greenSoft);border-color:#cfe9dd}.med.withheld{background:var(--amberSoft);border-color:#eedbb2}.med.missed{background:#fff0f1;border-color:#f0c7cb}.med.cancelled{background:var(--graySoft);border-color:#ddd8d4}.medname{font-size:17px;font-weight:900;line-height:1.35}.pill{display:inline-flex;margin-left:6px;padding:3px 7px;border-radius:999px;background:#f2efec;color:#666;font-size:10px;vertical-align:2px}.pill.warn{background:#fff1cf;color:#8a5800}.purpose{color:var(--redDark);font-size:12px;font-weight:800;margin-top:5px}.dose{color:#555;font-size:14px;line-height:1.5;margin-top:5px}.instruction{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}.audit{font-size:12px;font-weight:750;margin-top:9px;color:var(--green)}.med.withheld .audit{color:var(--amber)}.med.missed .audit{color:var(--redDark)}.med.cancelled .audit{color:#666}.medactions{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-top:13px}.donebtn{height:50px;border:0;border-radius:14px;background:var(--red);color:#fff;font-weight:900;font-size:16px}.med.done .donebtn{background:var(--green)}.med.withheld .donebtn,.med.missed .donebtn,.med.cancelled .donebtn{background:#fff;color:#333;border:1px solid var(--line)}.morebtn{height:50px;border:1px solid var(--line);border-radius:14px;background:#fff;color:#444;font-weight:800}.empty{background:#fff;border:1px dashed #d7d2ce;border-radius:20px;padding:28px;text-align:center;color:var(--muted)}
.optional{margin-top:17px}.optional summary{list-style:none;background:#fff;border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(20,20,20,.04);font-weight:900;display:flex;justify-content:space-between}.optional summary::-webkit-details-marker{display:none}.optional-body{padding-top:10px;display:grid;gap:10px}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick{min-height:76px;border:0;border-radius:17px;background:#fff;box-shadow:0 6px 20px rgba(20,20,20,.04);text-align:left;padding:14px}.quick b{display:block;margin-top:5px}.quick span{font-size:12px;color:var(--muted)}.note-card{background:#fff;border-radius:18px;padding:15px}.note-card textarea{width:100%;min-height:105px;border:0;background:#f7f5f2;border-radius:14px;padding:13px;outline:0;resize:vertical;line-height:1.6}.note-foot{font-size:11px;color:var(--muted);margin-top:8px}
.history{display:grid;gap:10px}.history-card{border:0;text-align:left;width:100%;background:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 6px 20px rgba(20,20,20,.04)}.history-top{display:flex;justify-content:space-between;gap:10px}.history-date{font-weight:900}.history-badge{background:var(--redSoft);color:var(--red);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850}.history-meta{margin-top:9px;color:var(--muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}.history-note{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:13px;color:#555;line-height:1.5}
.settings-grid{display:grid;gap:12px}.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 6px 20px rgba(20,20,20,.04)}.card h3{margin:0 0 12px}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;color:#555;font-weight:800}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px 12px;outline:0;background:#fbfaf9}.field textarea{min-height:92px;resize:vertical}.btnrow{display:flex;gap:9px;flex-wrap:wrap}.primary,.secondary,.danger,.warning{min-height:46px;border:0;border-radius:14px;padding:0 15px;font-weight:850}.primary{background:var(--red);color:#fff}.secondary{background:#f0eeeb;color:#222}.danger{background:#fff0f0;color:#b91c1c}.warning{background:var(--amberSoft);color:var(--amber)}.wide{width:100%}.medmanage{display:grid;gap:9px}.manageitem{padding:13px;border-radius:16px;background:#f8f6f4}.managehead{display:flex;gap:10px;align-items:flex-start}.managecopy{min-width:0;flex:1}.managecopy b{display:block;font-size:15px}.managecopy span{display:block;color:var(--muted);font-size:12px;margin-top:4px;line-height:1.45}.manageactions{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}.mini{min-height:38px;border:0;border-radius:11px;padding:0 11px;background:#fff;font-size:12px;font-weight:800}.mini.red{color:#b91c1c}.mini.amber{color:var(--amber)}.inactive{opacity:.72}.audit-list{display:grid;gap:8px}.audit-item{padding:10px 11px;border-radius:12px;background:#f8f6f4}.audit-item b{display:block;font-size:12px}.audit-item span{font-size:11px;color:var(--muted)}.backup-list{display:grid;gap:8px;margin-top:10px}.backup-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:13px;background:#f8f6f4}.backup-item div{flex:1}.backup-item b{display:block;font-size:12px}.backup-item span{font-size:11px;color:var(--muted)}
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,720px);display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:8px 12px calc(8px + var(--safe));z-index:30}.nav{height:58px;border:0;background:transparent;border-radius:15px;color:#777;font-size:11px;font-weight:800}.nav b{display:block;font-size:20px;margin-bottom:2px}.nav.active{background:var(--redSoft);color:var(--red)}
dialog{border:0;border-radius:24px;padding:0;width:min(calc(100% - 24px),520px);max-height:88vh;box-shadow:0 30px 90px rgba(0,0,0,.28)}dialog::backdrop{background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}.dialog-body{padding:20px;overflow:auto;max-height:88vh}.dialog-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}.dialog-head h3{margin:0;flex:1}.close{width:40px;height:40px;border:0;border-radius:12px;background:#f2efec;font-size:20px}.status-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.status-option input{display:none}.status-option span{display:grid;place-items:center;min-height:54px;border:1.5px solid var(--line);border-radius:14px;font-weight:850}.status-option input:checked+span{border-color:var(--red);background:var(--redSoft);color:var(--red)}.reason-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}.reason-chip{border:0;border-radius:999px;background:#f0eeeb;padding:8px 11px;font-size:12px}
.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe));transform:translate(-50%,20px);z-index:90;background:#181818;color:#fff;border-radius:14px;padding:12px 14px;min-width:160px;max-width:calc(100% - 30px);opacity:0;pointer-events:none;transition:.2s;display:flex;align-items:center;gap:10px;font-size:13px}.toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}.toast button{border:0;background:#fff;color:#111;border-radius:9px;padding:6px 9px;font-weight:800}.sync-detail{font-size:11px;color:var(--muted);margin-top:8px}
@media(max-width:390px){.now-action{grid-template-columns:1fr 96px}.medactions{grid-template-columns:1fr 90px}.title{font-size:19px}}
</style>
</head>
<body>
<div id="updateBanner" class="update-banner hidden"><span>发现新版</span><button id="reloadUpdate">立即更新</button></div>
<section id="login" class="login">
  <form id="loginForm" class="login-card">
    <div class="logo">药</div>
    <h1>老人用药记录</h1>
    <div class="password-wrap"><input id="password" type="password" inputmode="numeric" autocomplete="current-password" placeholder="访问密码"><button id="togglePassword" class="eye" type="button">👁</button></div>
    <button id="loginButton" class="login-button" type="submit">进入</button>
    <div id="loginError" class="login-error"></div>
  </form>
</section>
<section id="app" class="app hidden">
  <header class="top"><div class="toprow"><div class="titlebox"><div id="room" class="small"></div><div id="title" class="title">老人用药记录</div></div><button id="syncPill" class="sync">连接中</button></div></header>
  <main>
    <section id="todayPage" class="page active">
      <div class="datebar"><button id="prevDay" class="datebtn">‹</button><div class="datecenter"><div id="dateMain" class="datemain"></div><div id="dateSub" class="datesub"></div></div><button id="nextDay" class="datebtn">›</button></div>
      <section id="nowCard" class="now-card"><div id="nowEyebrow" class="now-eyebrow">现在</div><div id="nowTitle" class="now-title">正在读取今日安排</div><div id="nowMeta" class="now-meta"></div><div id="nowAction" class="now-action hidden"><button id="nowDone" class="now-done">记录已服</button><button id="nowOther" class="now-other">其他状态</button></div><div class="progress-strip"><div><b id="progressTitle">今日进度</b><br><span id="progressDetail"></span></div><span id="progressNumber" class="progress-number"></span></div></section>
      <div id="alert" class="alert hidden"></div>
      <details class="care"><summary>陪护提醒 <span id="careCount"></span></summary><div id="careBody" class="care-body"></div></details>
      <div class="section-head"><h3>今日用药</h3><span id="medCount"></span></div><div id="medGroups"></div>
      <details class="optional"><summary>＋ 记录其他情况 <span>可选</span></summary><div class="optional-body"><div class="quick-grid"><button id="addVitals" class="quick"><span>生命体征</span><b>血压、体温等</b></button><button id="focusNote" class="quick"><span>每日情况</span><b>精神、睡眠、查房</b></button></div><div class="note-card"><textarea id="dailyNote" placeholder="填写当天情况"></textarea><div id="noteFoot" class="note-foot"></div></div></div></details>
    </section>
    <section id="historyPage" class="page"><div class="section-head"><h3>历史记录</h3></div><div id="historyList" class="history"></div></section>
    <section id="settingsPage" class="page"><div class="section-head"><h3>管理</h3></div><div class="settings-grid">
      <div class="card"><h3>基本信息</h3><div class="field"><label>页面标题</label><input id="patientInput"></div><div class="field"><label>病区或位置</label><input id="roomInput"></div><button id="saveProfile" class="primary">保存</button></div>
      <div class="card"><h3>药品与方案</h3><div id="manageList" class="medmanage"></div><button id="addMed" class="primary wide" style="margin-top:12px">添加药品</button></div>
      <div class="card"><h3>备份与恢复</h3><div class="btnrow"><button id="createBackup" class="secondary">立即云端备份</button><button id="loadBackups" class="secondary">查看备份</button></div><div id="backupList" class="backup-list"></div></div>
      <div class="card"><h3>最近操作</h3><div id="auditList" class="audit-list"></div></div>
      <details class="card"><summary><b>数据工具</b></summary><div style="height:12px"></div><div class="btnrow"><button id="exportButton" class="secondary">导出 JSON</button><button id="importButton" class="warning">导入 JSON</button><input id="importFile" class="hidden" type="file" accept="application/json,.json"></div><div class="sync-detail">导入前会自动保存本机快照。</div></details>
      <button id="logout" class="danger wide">退出登录</button>
    </div></section>
  </main>
  <nav class="bottom"><button class="nav active" data-page="today"><b>今</b>今天</button><button class="nav" data-page="history"><b>历</b>历史</button><button class="nav" data-page="settings"><b>管</b>管理</button></nav>
</section>

<dialog id="statusDialog"><div class="dialog-body"><div class="dialog-head"><h3 id="statusTitle">记录状态</h3><button class="close" data-close="statusDialog">×</button></div><div class="status-grid"><label class="status-option"><input name="status" type="radio" value="done"><span>已服</span></label><label class="status-option"><input name="status" type="radio" value="withheld"><span>暂缓</span></label><label class="status-option"><input name="status" type="radio" value="missed"><span>未服</span></label><label class="status-option"><input name="status" type="radio" value="cancelled"><span>取消本次</span></label></div><div class="field" style="margin-top:14px"><label>实际时间</label><input id="statusTime" type="time"></div><div class="reason-chips"><button class="reason-chip" type="button">医生要求</button><button class="reason-chip" type="button">患者拒绝</button><button class="reason-chip" type="button">外出检查</button><button class="reason-chip" type="button">恶心呕吐</button></div><div class="field"><label>原因或备注</label><input id="statusReason" placeholder="可不填"></div><div class="btnrow"><button id="saveStatus" class="primary">保存</button><button id="revertStatus" class="secondary">撤销这条记录</button></div></div></dialog>
<dialog id="vitalDialog"><form id="vitalForm" class="dialog-body"><div class="dialog-head"><h3>记录生命体征</h3><button class="close" type="button" data-close="vitalDialog">×</button></div><div class="field"><label>时间</label><input id="vitalTime" type="time"></div><div class="quick-grid"><div class="field"><label>收缩压</label><input id="sys" inputmode="decimal"></div><div class="field"><label>舒张压</label><input id="dia" inputmode="decimal"></div><div class="field"><label>心率</label><input id="heart" inputmode="decimal"></div><div class="field"><label>体温 ℃</label><input id="temp" inputmode="decimal"></div><div class="field"><label>血氧 %</label><input id="spo2" inputmode="decimal"></div><div class="field"><label>体重 kg</label><input id="weight" inputmode="decimal"></div></div><button class="primary wide" type="submit">保存</button></form></dialog>
<dialog id="medTextDialog"><form id="medTextForm" class="dialog-body"><div class="dialog-head"><h3 id="medTextTitle">药品资料</h3><button class="close" type="button" data-close="medTextDialog">×</button></div><input id="medTextId" type="hidden"><div class="field"><label>药名</label><input id="medName" required></div><div class="field"><label>用途</label><input id="medPurpose"></div><div class="field"><label>通用说明</label><textarea id="medGeneralNote"></textarea></div><label style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><input id="medConfirm" type="checkbox"> 剂量待核对</label><label style="display:flex;gap:8px;align-items:center;margin-bottom:16px"><input id="medTestOnly" type="checkbox"> 测试药（允许彻底删除）</label><button class="primary wide" type="submit">保存资料</button></form></dialog>
<dialog id="regimenDialog"><form id="regimenForm" class="dialog-body"><div class="dialog-head"><h3 id="regimenTitle">调整用药方案</h3><button class="close" type="button" data-close="regimenDialog">×</button></div><input id="regimenMedId" type="hidden"><div id="regimenMedName" style="font-weight:900;margin-bottom:12px"></div><div class="field"><label>新剂量</label><input id="regimenDose" required placeholder="例如：100毫克，每次1片"></div><div class="field"><label>每天时间（一行一次）</label><textarea id="regimenSchedules" required placeholder="07:00 早餐前30分钟&#10;20:00 晚餐后"></textarea></div><div class="field"><label>服用说明</label><textarea id="regimenInstructions"></textarea></div><div class="field"><label>生效时间</label><input id="regimenEffective" type="datetime-local" required></div><div class="field"><label>调整原因</label><input id="regimenReason" placeholder="例如：医生调整剂量"></div><button class="primary wide" type="submit">保存新方案</button></form></dialog>
<dialog id="archiveDialog"><form id="archiveForm" class="dialog-body"><div class="dialog-head"><h3>停用药品</h3><button class="close" type="button" data-close="archiveDialog">×</button></div><input id="archiveMedId" type="hidden"><div id="archiveMedName" style="font-weight:900;margin-bottom:12px"></div><div class="field"><label>停用时间</label><input id="archiveEffective" type="datetime-local" required></div><div class="field"><label>原因</label><input id="archiveReason" value="按医嘱停用"></div><button class="danger wide" type="submit">确认停用</button></form></dialog>
<div id="toast" class="toast"><span id="toastText"></span><button id="toastAction" class="hidden"></button></div>
<script>
(()=>{'use strict';

function latestRegimen(med){return(med.regimens||[]).slice().sort((a,b)=>Date.parse(b.effectiveFrom)-Date.parse(a.effectiveFrom))[0]||null}
function hasHistory(medId){return Object.values(state.days||{}).some(d=>Object.values(d.medicationLogs||{}).some(l=>l.medicationId===medId&&l.status!=='reverted'))}
function renderManage(){const meds=state.meds.slice().sort((a,b)=>Number(a.archived)-Number(b.archived)||a.name.localeCompare(b.name,'zh-CN'));$('manageList').innerHTML=meds.length?meds.map(m=>{const r=latestRegimen(m),purge=m.testOnly||!hasHistory(m.id);return`<div class="manageitem ${m.archived?'inactive':''}"><div class="managehead"><div class="managecopy"><b>${esc(m.name)} ${m.archived?'（已停用）':''}</b><span>${esc(r?.dose||'暂无方案')}${r?.schedules?.length?' · '+r.schedules.map(s=>s.time).join('、'):''}</span></div></div><div class="manageactions"><button class="mini" data-edit-text="${m.id}">资料</button><button class="mini" data-adjust="${m.id}">调整方案</button>${m.archived?`<button class="mini" data-restore="${m.id}">恢复</button>`:`<button class="mini amber" data-archive="${m.id}">停用</button>`}${purge?`<button class="mini red" data-purge="${m.id}">彻底删除</button>`:''}</div></div>`}).join(''):'<div class="empty">暂无药品</div>'}
function renderAudit(){const list=(state.auditLogs||[]).slice(-12).reverse();$('auditList').innerHTML=list.length?list.map(a=>`<div class="audit-item"><b>${esc(a.summary||a.type)}</b><span>${new Date(a.at||a.updatedAt).toLocaleString('zh-CN')}</span></div>`).join(''):'<div class="muted">暂无操作记录</div>'}
function renderSettings(){$('patientInput').value=state.profile.patientName||'';$('roomInput').value=state.profile.room||'';renderManage();renderAudit()}
function render(){renderHeader();renderDate();renderHero();renderCare();renderMeds();renderNote();renderHistory();renderSettings();$('alert').textContent=state.profile.alert||'';$('alert').classList.toggle('hidden',!state.profile.alert);updateSync()}
function go(name){page=name;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(name+'Page').classList.add('active');document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.page===name));scrollTo({top:0,behavior:'smooth'})}
document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>go(n.dataset.page));$('prevDay').onclick=()=>{const d=parseDate(selected);d.setDate(d.getDate()-1);selected=dateKey(d);render()};$('nextDay').onclick=()=>{const d=parseDate(selected);d.setDate(d.getDate()+1);selected=dateKey(d);render()};
function findItem(key){return planItems(selected).find(i=>i.key===key)||planItems(dateKey(new Date())).find(i=>i.key===key)}
function setLog(item,status,reason='',actionTime=''){if(!item)return toast('找不到这项用药');const old=clone(state.days[selected]?.medicationLogs?.[item.key]||null),time=actionTime||`${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`,record={id:old?.id||uuid('administration'),status,reason,deviceId:deviceId(),plannedAt:plannedAt(selected,item.schedule),actionAt:dateMid(selected,time),updatedAt:now(),medicationId:item.med.id,regimenId:item.regimen.id,scheduleId:item.schedule.id,snapshot:snapshotFor(item)};const op=operation('setMedicationLog',{date:selected,key:item.key,record});enqueue(op);undoPayload={item,old};toast(`${statusText(status)}已记录`,'撤销',()=>{const revert=old?{...old,updatedAt:now()}:{...record,status:'reverted',reason:'撤销误操作',updatedAt:now(),actionAt:now()};enqueue(operation('setMedicationLog',{date:selected,key:item.key,record:revert}));toast('已撤销')},7000)}
function openStatus(key){const item=findItem(key);if(!item)return;statusTarget=item;const log=state.days[selected]?.medicationLogs?.[key];$('statusTitle').textContent=`${item.med.name} · ${item.schedule.time}`;document.querySelectorAll('[name=status]').forEach(r=>r.checked=r.value===(log?.status&&log.status!=='reverted'?log.status:'done'));$('statusReason').value=log?.reason||'';const d=log?.actionAt?new Date(log.actionAt):new Date();$('statusTime').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;$('revertStatus').classList.toggle('hidden',!log||log.status==='reverted');$('statusDialog').showModal()}
$('medGroups').onclick=e=>{const done=e.target.closest('[data-done]'),status=e.target.closest('[data-status]');if(done){const item=findItem(done.dataset.done);setLog(item,'done');return}if(status)openStatus(status.dataset.status)};$('nowDone').onclick=()=>setLog(findItem($('nowDone').dataset.key),'done');$('nowOther').onclick=()=>openStatus($('nowOther').dataset.key);
$('saveStatus').onclick=()=>{const status=document.querySelector('[name=status]:checked')?.value||'done';setLog(statusTarget,status,$('statusReason').value.trim(),$('statusTime').value);$('statusDialog').close()};$('revertStatus').onclick=()=>{const old=state.days[selected]?.medicationLogs?.[statusTarget.key];if(old){enqueue(operation('setMedicationLog',{date:selected,key:statusTarget.key,record:{...old,status:'reverted',reason:'撤销记录',updatedAt:now(),actionAt:now()}}));$('statusDialog').close();toast('记录已撤销')}};document.querySelectorAll('.reason-chip').forEach(b=>b.onclick=()=>{$('statusReason').value=b.textContent});
$('addVitals').onclick=()=>{const d=new Date();$('vitalTime').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;['sys','dia','heart','temp','spo2','weight'].forEach(id=>$(id).value='');$('vitalDialog').showModal()};$('focusNote').onclick=()=>{$('dailyNote').focus();$('dailyNote').scrollIntoView({behavior:'smooth',block:'center'})};$('vitalForm').onsubmit=e=>{e.preventDefault();const vital={id:uuid('vital'),time:$('vitalTime').value,sys:$('sys').value,dia:$('dia').value,heart:$('heart').value,temp:$('temp').value,spo2:$('spo2').value,weight:$('weight').value};if(![vital.sys,vital.dia,vital.heart,vital.temp,vital.spo2,vital.weight].some(Boolean))return toast('至少填写一项');enqueue(operation('addVital',{date:selected,vital}));$('vitalDialog').close();toast('生命体征已记录')};$('dailyNote').oninput=()=>{clearTimeout(noteTimer);noteTimer=setTimeout(()=>{enqueue(operation('saveNote',{date:selected,text:$('dailyNote').value.trim()}))},900)};
$('historyList').onclick=e=>{const b=e.target.closest('[data-date]');if(!b)return;selected=b.dataset.date;go('today');render()};$('saveProfile').onclick=()=>enqueue(operation('setProfile',{patientName:$('patientInput').value.trim()||'老人用药记录',room:$('roomInput').value.trim()||'住院陪护'}));
function localDateTime(date=new Date()){return`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`}
function parseSchedules(text,old=[]){return text.split(/\n+/).map(x=>x.trim()).filter(Boolean).map((line,i)=>{const m=line.match(/^(\d{1,2}:\d{2})\s*(.*)$/);return{id:old[i]?.id||uuid('schedule'),time:m?m[1]:'',label:m?m[2]:line,kind:'fixed',enabled:true}}).filter(s=>s.time)}
function openMedText(id=''){const m=state.meds.find(x=>x.id===id);$('medTextTitle').textContent=m?'修改药品资料':'添加药品';$('medTextId').value=m?.id||'';$('medName').value=m?.name||'';$('medPurpose').value=m?.purpose||'';$('medGeneralNote').value=m?.generalNote||'';$('medConfirm').checked=!!m?.needsConfirmation;$('medTestOnly').checked=!!m?.testOnly;$('medTextDialog').showModal()}
function openRegimen(id){const m=state.meds.find(x=>x.id===id),r=m?latestRegimen(m):null;$('regimenMedId').value=m?.id||id||uuid('med');$('regimenMedName').textContent=m?.name||'新药品';$('regimenDose').value=r?.dose||'';$('regimenSchedules').value=(r?.schedules||[]).map(s=>`${s.time} ${s.label||''}`.trim()).join('\n');$('regimenInstructions').value=r?.instructions||'';$('regimenEffective').value=localDateTime();$('regimenReason').value='';$('regimenDialog').showModal()}
$('addMed').onclick=()=>openMedText();$('medTextForm').onsubmit=e=>{e.preventDefault();const id=$('medTextId').value||uuid('med'),isNew=!state.meds.some(m=>m.id===id),payload={id,name:$('medName').value.trim(),purpose:$('medPurpose').value.trim(),generalNote:$('medGeneralNote').value.trim(),needsConfirmation:$('medConfirm').checked,testOnly:$('medTestOnly').checked};if(!payload.name)return toast('请填写药名');enqueue(operation('upsertMedicationText',payload));$('medTextDialog').close();toast('资料已保存');if(isNew)setTimeout(()=>openRegimen(id),180)};
$('regimenForm').onsubmit=e=>{e.preventDefault();const medId=$('regimenMedId').value,m=state.meds.find(x=>x.id===medId),r=latestRegimen(m||{regimens:[]}),effective=new Date($('regimenEffective').value).toISOString();localSnapshot(`调整方案前：${m?.name||'新药品'}`);enqueue(operation('adjustRegimen',{medId,effectiveFrom:effective,changeReason:$('regimenReason').value.trim(),regimen:{id:uuid('regimen'),dose:$('regimenDose').value.trim(),schedules:parseSchedules($('regimenSchedules').value,r?.schedules||[]),instructions:$('regimenInstructions').value.trim()}}));$('regimenDialog').close();toast('新方案已保存')};
$('manageList').onclick=e=>{const text=e.target.closest('[data-edit-text]'),adjust=e.target.closest('[data-adjust]'),archive=e.target.closest('[data-archive]'),restore=e.target.closest('[data-restore]'),purge=e.target.closest('[data-purge]');if(text)return openMedText(text.dataset.editText);if(adjust)return openRegimen(adjust.dataset.adjust);if(archive){const m=state.meds.find(x=>x.id===archive.dataset.archive);$('archiveMedId').value=m.id;$('archiveMedName').textContent=m.name;$('archiveEffective').value=localDateTime();$('archiveReason').value='按医嘱停用';$('archiveDialog').showModal();return}if(restore){const m=state.meds.find(x=>x.id===restore.dataset.restore);if(confirm(`恢复“${m.name}”吗？恢复后仍需新增有效用药方案。`)){enqueue(operation('restoreMedication',{medId:m.id}));setTimeout(()=>openRegimen(m.id),180)}return}if(purge){const m=state.meds.find(x=>x.id===purge.dataset.purge);if(confirm(`彻底删除“${m.name}”吗？此操作只适合测试药或无历史记录的药。`)){localSnapshot(`删除前：${m.name}`);enqueue(operation('purgeMedication',{medId:m.id}))}}};$('archiveForm').onsubmit=e=>{e.preventDefault();const m=state.meds.find(x=>x.id===$('archiveMedId').value);localSnapshot(`停用前：${m?.name||''}`);enqueue(operation('archiveMedication',{medId:$('archiveMedId').value,effectiveAt:new Date($('archiveEffective').value).toISOString(),reason:$('archiveReason').value.trim()}));$('archiveDialog').close();toast('药品已停用')};
$('createBackup').onclick=async()=>{try{const r=await api('POST',{action:'createBackup'});toast('云端备份已创建');loadBackups()}catch(e){toast(e.message)}};async function loadBackups(){try{const r=await api('GET',null,'?mode=backups');const list=r.backups||[];$('backupList').innerHTML=list.length?list.map(b=>`<div class="backup-item"><div><b>${esc(b.label||b.date||'备份')}</b><span>${new Date(b.createdAt).toLocaleString('zh-CN')}</span></div><button class="mini" data-restore-backup="${b.id}">恢复</button></div>`).join(''):'<div class="muted">暂无备份</div>'}catch(e){toast(e.message)}}$('loadBackups').onclick=loadBackups;$('backupList').onclick=async e=>{const b=e.target.closest('[data-restore-backup]');if(!b)return;if(!confirm('恢复后，当前数据会先自动备份。确定继续吗？'))return;localSnapshot('恢复云端备份前');try{const op=operation('restoreBackup',{}),r=await api('POST',{action:'restoreBackup',backupId:b.dataset.restoreBackup,operation:op});state=norm(r.state||r);queue=[];save(QUEUE,queue);save(STORE,state);render();toast('备份已恢复')}catch(err){toast(err.message)}};
$('exportButton').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`老人用药记录-${dateKey(new Date())}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};$('importButton').onclick=()=>$('importFile').click();$('importFile').onchange=async e=>{const file=e.target.files?.[0];if(!file)return;try{const data=norm(JSON.parse(await file.text()));if(!confirm(`将导入 ${data.meds.length} 种药品并与云端数据合并，继续吗？`))return;localSnapshot('导入前');const r=await api('PUT',data);state=norm(r.state||r);save(STORE,state);render();toast('导入完成')}catch(err){toast('导入失败：'+err.message)}finally{e.target.value=''}};$('logout').onclick=()=>{if(confirm('确定退出登录吗？'))logout(false)};
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());$('syncPill').onclick=async()=>{await flushQueue();await pull({manual:true})};document.addEventListener('visibilitychange',()=>{if(document.hidden)clearTimeout(pollTimer);else{markActivity();flushQueue().then(()=>pull());checkVersion()}});window.addEventListener('online',()=>{flushQueue().then(()=>pull())});['pointerdown','keydown'].forEach(ev=>document.addEventListener(ev,markActivity,{passive:true}));
async function checkVersion(){try{const html=await fetch(`${location.pathname}?update-check=${Date.now()}`,{cache:'no-store'}).then(r=>r.text());const match=html.match(/<meta name="app-version" content="([^"]+)"/);if(match&&match[1]!==APP_VERSION)$('updateBanner').classList.remove('hidden')}catch{}}$('reloadUpdate').onclick=()=>location.replace(`${location.pathname}?updated=${Date.now()}`);setInterval(checkVersion,10*60*1000);
if(token())showApp();else logout(false);
})();
