<style>

.app{width:min(100%,720px);min-height:100vh;margin:auto;padding-bottom:calc(88px + var(--safe))}.top{position:sticky;top:0;z-index:20;background:rgba(246,245,243,.93);backdrop-filter:blur(18px);border-bottom:1px solid rgba(233,231,228,.85);padding:calc(11px + env(safe-area-inset-top,0px)) 16px 11px}.toprow{display:flex;align-items:center;gap:12px}.titlebox{min-width:0;flex:1}.small{font-size:12px;color:var(--muted)}.title{font-size:21px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.sync{border:0;border-radius:999px;padding:8px 11px;background:#eeeae7;color:#666;font-size:12px;font-weight:750;white-space:nowrap}.sync.ok{background:var(--greenSoft);color:var(--green)}.sync.busy{background:var(--redSoft);color:var(--red)}.sync.bad{background:var(--amberSoft);color:var(--amber)}

.alert{margin-top:12px;padding:13px 14px;border-radius:16px;background:#fff8e8;border:1px solid #f1dfb4;color:#714a00;font-size:13px;line-height:1.55}.section-head{display:flex;justify-content:space-between;align-items:center;margin:22px 4px 10px}.section-head h3{margin:0;font-size:18px}.section-head span{font-size:12px;color:var(--muted)}.timegroup{margin-bottom:14px}.timelabel{display:flex;align-items:center;gap:7px;margin:0 5px 8px;font-size:12px;color:var(--muted);font-weight:750}.dot{width:7px;height:7px;border-radius:50%;background:var(--red)}.meds{display:grid;gap:9px}.med{background:#fff;border-radius:19px;padding:15px;box-shadow:0 6px 20px rgba(20,20,20,.045);border:1px solid transparent}.med.done{background:var(--greenSoft);border-color:#d1ecdf}.med.skipped{background:var(--amberSoft);border-color:#f2dfb9}.medtop{display:flex;gap:10px;align-items:flex-start}.medcopy{min-width:0;flex:1}.medname{font-size:16px;font-weight:850;line-height:1.35}.pill{display:inline-flex;margin-left:6px;padding:3px 7px;border-radius:999px;background:#f2efec;color:#666;font-size:10px;vertical-align:2px}.pill.warn{background:#fff1cf;color:#8a5800}.purpose{color:var(--red2);font-size:12px;font-weight:750;margin-top:5px}.dose{color:var(--muted);font-size:13px;line-height:1.5;margin-top:4px}.instruction{font-size:12px;color:#4f4f52;line-height:1.5;margin-top:6px}.audit{font-size:11px;color:var(--green);margin-top:8px}.med.skipped .audit{color:var(--amber)}.medactions{display:grid;grid-template-columns:1fr 92px;gap:8px;margin-top:13px}.donebtn{height:48px;border:0;border-radius:14px;background:#f0eeeb;color:#333;font-weight:850;font-size:15px}.med.done .donebtn{background:var(--green);color:#fff}.morebtn{height:48px;border:1px solid var(--line);border-radius:14px;background:#fff;color:#555;font-weight:750}.empty{background:#fff;border:1px dashed #d7d2ce;border-radius:20px;padding:28px;text-align:center;color:var(--muted)}
.optional{margin-top:17px}.optional summary{list-style:none;background:#fff;border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(20,20,20,.04);font-weight:850;display:flex;justify-content:space-between;align-items:center}.optional summary::-webkit-details-marker{display:none}.optional-body{padding-top:10px;display:grid;gap:10px}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick{min-height:76px;border:0;border-radius:17px;background:#fff;box-shadow:0 6px 20px rgba(20,20,20,.04);text-align:left;padding:14px}.quick b{display:block;margin-top:5px}.quick span{font-size:12px;color:var(--muted)}.note-card{background:#fff;border-radius:18px;padding:15px}.note-card textarea{width:100%;min-height:105px;border:0;background:#f7f5f2;border-radius:14px;padding:13px;outline:0;resize:vertical;line-height:1.6}.note-foot{font-size:11px;color:var(--muted);margin-top:8px}
.history{display:grid;gap:10px}.history-card{border:0;text-align:left;width:100%;background:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 6px 20px rgba(20,20,20,.04)}.history-top{display:flex;justify-content:space-between;gap:10px}.history-date{font-weight:850}.history-badge{background:var(--redSoft);color:var(--red);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.history-meta{margin-top:9px;color:var(--muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}.history-note{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:13px;color:#555;line-height:1.5}
.settings-grid{display:grid;gap:12px}.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 6px 20px rgba(20,20,20,.04)}.card h3{margin:0 0 12px}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;color:#555;font-weight:750}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px 12px;outline:0;background:#fbfaf9}.field textarea{min-height:92px;resize:vertical}.btnrow{display:flex;gap:9px;flex-wrap:wrap}.primary,.secondary,.danger{min-height:46px;border:0;border-radius:14px;padding:0 15px;font-weight:820}.primary{background:var(--red);color:#fff}.secondary{background:#f0eeeb;color:#222}.danger{background:#fff0f0;color:#b91c1c}.wide{width:100%}.medmanage{display:grid;gap:8px}.manageitem{display:flex;gap:10px;align-items:center;padding:12px;border-radius:15px;background:#f8f6f4}.managecopy{min-width:0;flex:1}.managecopy b{display:block}.managecopy span{display:block;color:var(--muted);font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.editbtn{width:42px;height:42px;border:0;border-radius:13px;background:#fff}.inactive{opacity:.65}.privacy{font-size:12px;color:var(--muted);line-height:1.6}
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,720px);display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.95);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:8px 12px calc(8px + var(--safe));z-index:30}.nav{height:58px;border:0;border-radius:16px;background:transparent;color:#777;font-weight:750}.nav.active{background:var(--redSoft);color:var(--red)}.nav span{display:block;font-size:20px;line-height:1.1}.nav small{font-size:11px}
dialog{border:0;border-radius:24px;padding:0;width:min(calc(100% - 24px),610px);max-height:88vh;box-shadow:0 25px 80px rgba(0,0,0,.23)}dialog::backdrop{background:rgba(0,0,0,.42);backdrop-filter:blur(3px)}.dhead{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:17px 18px 13px;border-bottom:1px solid var(--line);z-index:2}.dhead b{font-size:19px}.close{width:38px;height:38px;border:0;border-radius:50%;background:#f0eeeb;font-size:18px}.dbody{padding:17px 18px 22px;overflow:auto;max-height:calc(88vh - 68px)}.choices{display:grid;gap:9px}.choice{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px}.toast{position:fixed;left:50%;bottom:calc(94px + var(--safe));transform:translate(-50%,20px);background:#222;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:80;max-width:calc(100% - 30px);text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:640px){main{padding:18px}.quick-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<section id="login" class="login">
  <form id="loginForm" class="login-card">
    <div class="logo">药</div>
    <h1>老人用药记录</h1>
    <p>请输入家人共用的访问密码。登录后会自动读取最新记录。</p>
    <div class="password-wrap"><input id="password" type="password" autocomplete="current-password" placeholder="访问密码" required><button id="togglePassword" class="eye" type="button" aria-label="显示密码">◉</button></div>
    <button id="loginButton" class="login-button" type="submit">进入记录</button>
    <div id="loginError" class="login-error"></div>
    <p class="security-note">访问密码由腾讯云后台验证，未写在公开网页源码中。</p>
  </form>
</section>
<div id="app" class="app hidden">
<header class="top"><div class="toprow"><div class="titlebox"><div id="room" class="small">住院陪护</div><div id="title" class="title">老人用药记录</div></div><button id="syncPill" class="sync">正在连接</button></div></header>
<main>
<section id="todayPage" class="page active">
  <div class="datebar"><button id="prevDay" class="datebtn">‹</button><div class="datecenter"><div id="dateMain" class="datemain"></div><div id="dateSub" class="datesub"></div></div><button id="nextDay" class="datebtn">›</button></div>
  <div class="hero"><div class="hero-row"><div id="ring" class="ring"><span id="percent">0%</span></div><div><h2 id="progressTitle">今天还未开始</h2><p id="progressDesc">按时间完成用药，家人会自动看到记录。</p></div></div><div class="next"><div class="next-icon">◷</div><div><span>下一项</span><strong id="nextText">暂无待办</strong></div></div></div>
  <div id="alert" class="alert hidden"></div>
  <div class="section-head"><h3>今日用药</h3><span id="medCount"></span></div>
  <div id="medGroups"></div>
  <details class="optional"><summary><span>可选记录</span><span>血压、体温、备注 ›</span></summary><div class="optional-body"><div class="quick-grid"><button id="addVitals" class="quick"><span>＋</span><b>生命体征</b><span>血压、心率、体温等</span></button><button id="focusNote" class="quick"><span>✎</span><b>今日情况</b><span>精神、食欲、检查等</span></button></div><div class="note-card"><textarea id="dailyNote" placeholder="可选：记录精神状态、食欲、检查、医生交代等"></textarea><div id="noteFoot" class="note-foot">无需填写也可以正常使用</div></div></div></details>
</section>
<section id="historyPage" class="page"><div class="section-head" style="margin-top:4px"><h3>历史记录</h3><span>点日期可查看</span></div><div id="historyList" class="history"></div></section>
<section id="settingsPage" class="page"><div class="settings-grid">
  <div class="card"><h3>本机信息</h3><div class="field"><label>本机记录人</label><input id="operatorInput" placeholder="例如：妈妈、舅舅、家属"></div><div class="field"><label>页面标题</label><input id="patientInput"></div><div class="field"><label>病区/地点</label><input id="roomInput"></div><button id="saveProfile" class="primary wide">保存</button></div>
  <div class="card"><h3>药品管理</h3><div id="manageList" class="medmanage"></div><button id="addMed" class="secondary wide" style="margin-top:10px">＋ 添加药品</button></div>
  <div class="card"><h3>数据工具</h3><div class="btnrow"><button id="importButton" class="secondary">导入初始化数据</button><button id="exportButton" class="secondary">导出备份</button><input id="importFile" type="file" accept="application/json,.json" class="hidden"></div><p class="privacy">初始化数据文件只在你的设备上读取，导入后上传到腾讯云。不要把包含病情的 JSON 文件上传到公开 GitHub 仓库。</p></div>
  <div class="card"><h3>病程概要</h3><div id="summaryText" class="privacy">尚未导入</div></div>
  <button id="logout" class="danger wide">退出登录</button>
</div></section>
</main>
<nav class="bottom"><button class="nav active" data-page="today"><span>✓</span><small>今天</small></button><button class="nav" data-page="history"><span>◷</span><small>记录</small></button><button class="nav" data-page="settings"><span>⚙</span><small>设置</small></button></nav>
</div>
<dialog id="statusDialog"><div class="dhead"><b id="statusTitle">修改状态</b><button class="close" data-close="statusDialog">×</button></div><div class="dbody"><div class="choices"><label class="choice"><input type="radio" name="status" value="done" checked> 已服</label><label class="choice"><input type="radio" name="status" value="skipped"> 暂缓 / 未服</label><label class="choice"><input type="radio" name="status" value="clear"> 清除记录</label></div><div class="field" style="margin-top:13px"><label>原因（可选）</label><input id="statusReason" placeholder="例如：医生要求暂缓"></div><button id="saveStatus" class="primary wide">保存状态</button></div></dialog>
<dialog id="vitalDialog"><div class="dhead"><b>记录生命体征</b><button class="close" data-close="vitalDialog">×</button></div><form id="vitalForm" class="dbody"><div class="field"><label>时间</label><input id="vitalTime" type="time" required></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="field"><label>收缩压</label><input id="sys" inputmode="decimal" placeholder="mmHg"></div><div class="field"><label>舒张压</label><input id="dia" inputmode="decimal" placeholder="mmHg"></div><div class="field"><label>心率</label><input id="heart" inputmode="decimal" placeholder="次/分"></div><div class="field"><label>体温</label><input id="temp" inputmode="decimal" placeholder="℃"></div><div class="field"><label>血氧</label><input id="spo2" inputmode="decimal" placeholder="%"></div><div class="field"><label>体重</label><input id="weight" inputmode="decimal" placeholder="kg"></div></div><button class="primary wide" type="submit">保存记录</button></form></dialog>
<dialog id="medDialog"><div class="dhead"><b id="medDialogTitle">药品</b><button class="close" data-close="medDialog">×</button></div><form id="medForm" class="dbody"><input id="medId" type="hidden"><div class="field"><label>药品名称</label><input id="medName" required></div><div class="field"><label>剂量</label><input id="medDose" placeholder="例如：100毫克，每次1片"></div><div class="field"><label>用途</label><input id="medPurpose" placeholder="例如：降压"></div><div class="field"><label>服用说明</label><textarea id="medNote"></textarea></div><div class="field"><label>每天时间（每行一个，例如：07:00 早餐前）</label><textarea id="medSchedules" placeholder="07:00 早餐前约30分钟&#10;18:00 晚餐随餐"></textarea></div><label class="choice"><input id="medActive" type="checkbox" checked> 当前仍在使用</label><label class="choice"><input id="medConfirm" type="checkbox"> 剂量或用法仍需核对</label><button class="primary wide" type="submit" style="margin-top:12px">保存药品</button></form></dialog>
<div id="toast" class="toast"></div>
<script>
(()=>{'use strict';
const API='https://medhome-d5gjd562l8b1d138e-1329150250.ap-shanghai.app.tcloudbase.com/medication-sync';
const STORE='medication-care-v3-state',CFG='medication-care-v3-config',TOKEN='medication-care-session';
const $=id=>document.getElementById(id),now=()=>new Date().toISOString(),clone=v=>JSON.parse(JSON.stringify(v));
const uuid=()=>crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(16).slice(2);
const pad=n=>String(n).padStart(2,'0'),dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseDate=s=>{const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
function base(){return{version:3,profile:{patientName:'老人用药记录',room:'住院陪护',clinicalSummary:'',alert:'',updatedAt:now()},meds:[],days:{},operators:[],updatedAt:now()}}
function norm(x){const b=base();if(!x||typeof x!=='object'||Array.isArray(x))return b;return{...b,...x,profile:{...b.profile,...(x.profile||{})},meds:Array.isArray(x.meds)?x.meds:[],days:x.days&&typeof x.days==='object'&&!Array.isArray(x.days)?x.days:{},operators:Array.isArray(x.operators)?x.operators:[]}}
function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
let state=norm(load(STORE,base())),cfg=load(CFG,{operator:'家属',pending:false}),selected=dateKey(new Date()),page='today',busy=false,poll=null,uploadTimer=null,noteTimer=null,lastActivity=Date.now(),failures=0,statusTarget=null;
function newer(a,b){if(!a)return b?clone(b):null;if(!b)return clone(a);return String(b.updatedAt||'')>String(a.updatedAt||'')?clone(b):clone(a)}
function mergeList(a=[],b=[]){const m=new Map();[...a,...b].forEach(i=>{if(!i||!i.id)return;const o=m.get(i.id);if(!o||String(i.updatedAt||'')>=String(o.updatedAt||''))m.set(i.id,clone(i))});return [...m.values()]}
function merge(a,b){a=norm(a);b=norm(b);const o=base();o.profile=newer(a.profile,b.profile);o.meds=mergeList(a.meds,b.meds);o.operators=[...new Set([...(a.operators||[]),...(b.operators||[])])];o.days={};new Set([...Object.keys(a.days||{}),...Object.keys(b.days||{})]).forEach(k=>{const x=a.days[k]||{},y=b.days[k]||{},logs={};new Set([...Object.keys(x.medicationLogs||{}),...Object.keys(y.medicationLogs||{})]).forEach(q=>logs[q]=newer(x.medicationLogs?.[q],y.medicationLogs?.[q]));o.days[k]={medicationLogs:logs,vitals:mergeList(x.vitals||[],y.vitals||[]),note:newer(x.note,y.note)||{text:'',operator:'',updatedAt:''}}});o.updatedAt=[a.updatedAt,b.updatedAt,now()].sort().at(-1);return o}
function token(){return sessionStorage.getItem(TOKEN)||''}function setToken(v){v?sessionStorage.setItem(TOKEN,v):sessionStorage.removeItem(TOKEN)}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('show'),2300)}
function syncLabel(kind,text){$('syncPill').className='sync '+kind;$('syncPill').textContent=text}
async function request(method,body){const headers={'Content-Type':'application/json'};if(method!=='POST')headers.Authorization='Bearer '+token();const r=await fetch(API,{method,headers,body:body?JSON.stringify(body):undefined});let data=null;try{data=await r.json()}catch{}if(r.status===401&&method!=='POST'){logout(true);throw new Error('登录已失效')}if(!r.ok){const e=new Error(data?.error||`请求失败（${r.status}）`);e.status=r.status;throw e}return data}
function showApp(){ $('login').classList.add('hidden');$('app').classList.remove('hidden');render();syncNow('login') }
function logout(expired=false){setToken('');clearTimeout(poll);$('app').classList.add('hidden');$('login').classList.remove('hidden');$('password').value='';$('loginError').textContent=expired?'登录已失效，请重新输入密码':''}
$('loginForm').addEventListener('submit',async e=>{e.preventDefault();$('loginError').textContent='';$('loginButton').disabled=true;$('loginButton').textContent='正在验证…';try{const r=await request('POST',{action:'login',password:$('password').value});setToken(r.token);showApp()}catch(err){$('loginError').textContent=err.message}finally{$('loginButton').disabled=false;$('loginButton').textContent='进入记录'}});
$('togglePassword').onclick=()=>{$('password').type=$('password').type==='password'?'text':'password'};
function ensureDay(k){state.days[k]||={medicationLogs:{},vitals:[],note:{text:'',operator:'',updatedAt:''}};return state.days[k]}
function persist(renderToo=true){state.updatedAt=now();cfg.pending=true;save(STORE,state);save(CFG,cfg);lastActivity=Date.now();if(renderToo)render();clearTimeout(uploadTimer);uploadTimer=setTimeout(()=>syncNow('write'),1000);schedule()}
async function syncNow(intent='poll'){if(busy||!token()||document.hidden||navigator.onLine===false)return;busy=true;syncLabel('busy','正在同步');try{let remote=null;try{remote=await request('GET')}catch(e){if(e.status!==404)throw e}let merged=remote?merge(state,remote):state;state=merged;save(STORE,state);if(cfg.pending||(!remote&&state.meds.length)){state=norm(await request('PUT',state));cfg.pending=false;save(CFG,cfg);save(STORE,state)}failures=0;syncLabel('ok','已同步');render();if(intent==='manual')toast('已获取最新记录')}catch(e){failures++;syncLabel('bad',navigator.onLine===false?'当前离线':'同步失败');if(intent==='manual')toast(e.message)}finally{busy=false;schedule()}}
function schedule(){clearTimeout(poll);if(!token()||document.hidden||navigator.onLine===false)return;let ms=Date.now()-lastActivity<120000?5000:30000;if(failures)ms=[10000,30000,60000,120000][Math.min(failures-1,3)];poll=setTimeout(()=>syncNow('poll'),ms)}
document.addEventListener('visibilitychange',()=>{if(!document.hidden){lastActivity=Date.now();syncNow('resume')}else clearTimeout(poll)});window.addEventListener('online',()=>syncNow('resume'));['pointerdown','keydown'].forEach(ev=>document.addEventListener(ev,()=>{lastActivity=Date.now();schedule()},{passive:true}));$('syncPill').onclick=()=>syncNow('manual');
function activeMeds(){return state.meds.filter(m=>!m.deleted&&m.active!==false)}
function items(){return activeMeds().flatMap(m=>(m.schedules||[]).filter(s=>s.enabled!==false&&s.kind!=='prn').map(s=>({med:m,schedule:s,key:`${m.id}::${s.id}`}))).sort((a,b)=>String(a.schedule.time||'99:99').localeCompare(String(b.schedule.time||'99:99')))}
function progress(k){const list=items(),logs=state.days[k]?.medicationLogs||{},done=list.filter(x=>logs[x.key]?.status==='done').length,handled=list.filter(x=>['done','skipped'].includes(logs[x.key]?.status)).length;return{total:list.length,done,handled,percent:list.length?Math.round(done/list.length*100):0}}
function friendly(k){const t=dateKey(new Date()),d=parseDate(k);if(k===t)return'今天';return`${d.getMonth()+1}月${d.getDate()}日`}
function timePeriod(t){const h=Number(String(t||'99').slice(0,2));return h<10?'早上':h<14?'中午':h<20?'晚上':'睡前'}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function renderHeader(){$('title').textContent=state.profile.patientName||'老人用药记录';$('room').textContent=state.profile.room||'住院陪护'}
function renderDate(){const d=parseDate(selected),week='日一二三四五六'[d.getDay()];$('dateMain').textContent=friendly(selected);$('dateSub').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 周${week}`}
function renderHero(){const p=progress(selected);$('ring').style.setProperty('--p',`${p.percent*3.6}deg`);$('percent').textContent=p.percent+'%';$('progressTitle').textContent=p.total===0?'今天没有固定用药':p.done===p.total?'今天已全部完成':p.done===0?'今天还未开始':`已完成 ${p.done}/${p.total}`;$('progressDesc').textContent=p.total?'点击大按钮即可记录，其他家人会自动看到。':'可在设置中添加药品。';const logs=state.days[selected]?.medicationLogs||{},next=items().find(x=>!['done','skipped'].includes(logs[x.key]?.status));$('nextText').textContent=next?`${next.schedule.time} · ${next.med.name}`:'暂无待办';$('medCount').textContent=p.total?`${p.done}/${p.total} 已服`:'';$('alert').textContent=state.profile.alert||'';$('alert').classList.toggle('hidden',!state.profile.alert)}
function renderMeds(){const list=items(),logs=state.days[selected]?.medicationLogs||{};if(!list.length){$('medGroups').innerHTML='<div class="empty">今天没有固定用药</div>';return}const groups={};list.forEach(x=>(groups[timePeriod(x.schedule.time)]||=[]).push(x));$('medGroups').innerHTML=Object.entries(groups).map(([g,arr])=>`<div class="timegroup"><div class="timelabel"><span class="dot"></span>${g}</div><div class="meds">${arr.map(({med,schedule,key})=>{const l=logs[key],cls=l?.status==='done'?'done':l?.status==='skipped'?'skipped':'';return`<article class="med ${cls}"><div class="medtop"><div class="medcopy"><div class="medname">${esc(med.name)}${med.needsConfirmation?'<span class="pill warn">剂量待核对</span>':''}</div><div class="purpose">${esc(med.purpose||'')}</div><div class="dose">${esc(schedule.time)} · ${esc(schedule.label||'')} · ${esc(med.dose||'')}</div>${med.note?`<div class="instruction">${esc(med.note)}</div>`:''}${l?`<div class="audit">${l.status==='done'?'已服':'暂缓'} · ${esc(l.operator||'家属')} · ${new Date(l.actionAt||l.updatedAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false})}${l.reason?' · '+esc(l.reason):''}</div>`:''}</div></div><div class="medactions"><button class="donebtn" data-toggle="${esc(key)}">${l?.status==='done'?'✓ 已服':'点此记录已服'}</button><button class="morebtn" data-more="${esc(key)}">其他状态</button></div></article>`}).join('')}</div></div>`).join('')}
function renderNote(){const n=state.days[selected]?.note||{};$('dailyNote').value=n.text||'';$('noteFoot').textContent=n.updatedAt?`${n.operator||'家属'} · ${new Date(n.updatedAt).toLocaleString('zh-CN')}`:'无需填写也可以正常使用'}
function renderHistory(){const keys=Object.keys(state.days||{}).filter(k=>{const d=state.days[k];return Object.keys(d.medicationLogs||{}).length||(d.vitals||[]).length||d.note?.text}).sort().reverse();$('historyList').innerHTML=keys.length?keys.map(k=>{const p=progress(k),d=state.days[k],skipped=Object.values(d.medicationLogs||{}).filter(x=>x.status==='skipped').length;return`<button class="history-card" data-date="${k}"><div class="history-top"><div><div class="history-date">${friendly(k)}</div><div class="small">${k}</div></div><div class="history-badge">${p.done}/${p.total} 已服</div></div><div class="history-meta"><span>体征 ${(d.vitals||[]).length} 次</span>${skipped?`<span>暂缓 ${skipped} 项</span>`:''}</div>${d.note?.text?`<div class="history-note">${esc(d.note.text)}</div>`:''}</button>`}).join(''):'<div class="empty">还没有历史记录</div>'}
function renderSettings(){$('operatorInput').value=cfg.operator||'家属';$('patientInput').value=state.profile.patientName||'';$('roomInput').value=state.profile.room||'';$('summaryText').textContent=state.profile.clinicalSummary||'尚未导入病程概要';const all=state.meds.filter(m=>!m.deleted);$('manageList').innerHTML=all.length?all.map(m=>`<div class="manageitem ${m.active===false?'inactive':''}"><div class="managecopy"><b>${esc(m.name)} ${m.active===false?'（已停用）':''}</b><span>${esc(m.dose||'')} · ${esc(m.purpose||'')}</span></div><button class="editbtn" data-edit="${esc(m.id)}">✎</button></div>`).join(''):'<div class="empty">暂无药品</div>'}
function render(){renderHeader();renderDate();renderHero();renderMeds();renderNote();renderHistory();renderSettings()}
function go(p){page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(p+'Page').classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.page===p));scrollTo({top:0,behavior:'smooth'})}
document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>go(b.dataset.page));$('prevDay').onclick=()=>{const d=parseDate(selected);d.setDate(d.getDate()-1);selected=dateKey(d);render()};$('nextDay').onclick=()=>{const d=parseDate(selected);d.setDate(d.getDate()+1);selected=dateKey(d);render()};
$('medGroups').addEventListener('click',e=>{const t=e.target.closest('[data-toggle],[data-more]');if(!t)return;const key=t.dataset.toggle||t.dataset.more;const [medId,scheduleId]=key.split('::');if(t.dataset.toggle){const day=ensureDay(selected),old=day.medicationLogs[key];if(old?.status==='done')delete day.medicationLogs[key];else day.medicationLogs[key]={status:'done',operator:cfg.operator||'家属',reason:'',actionAt:now(),updatedAt:now()};persist()}else{statusTarget={key,medId,scheduleId};const med=state.meds.find(m=>m.id===medId),sch=med?.schedules?.find(s=>s.id===scheduleId),log=state.days[selected]?.medicationLogs?.[key];$('statusTitle').textContent=`${med?.name||''} · ${sch?.time||''}`;document.querySelectorAll('[name=status]').forEach(r=>r.checked=r.value===(log?.status||'done'));$('statusReason').value=log?.reason||'';$('statusDialog').showModal()}});
$('saveStatus').onclick=()=>{const v=document.querySelector('[name=status]:checked')?.value||'done',day=ensureDay(selected);if(v==='clear')delete day.medicationLogs[statusTarget.key];else day.medicationLogs[statusTarget.key]={status:v,operator:cfg.operator||'家属',reason:$('statusReason').value.trim(),actionAt:now(),updatedAt:now()};$('statusDialog').close();persist()};
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());$('addVitals').onclick=()=>{const d=new Date();$('vitalTime').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;['sys','dia','heart','temp','spo2','weight'].forEach(x=>$(x).value='');$('vitalDialog').showModal()};$('focusNote').onclick=()=>{$('dailyNote').focus();$('dailyNote').scrollIntoView({behavior:'smooth',block:'center'})};
$('vitalForm').onsubmit=e=>{e.preventDefault();const v={id:uuid(),time:$('vitalTime').value,sys:$('sys').value,dia:$('dia').value,heart:$('heart').value,temp:$('temp').value,spo2:$('spo2').value,weight:$('weight').value,operator:cfg.operator||'家属',updatedAt:now(),deleted:false};if(![v.sys,v.dia,v.heart,v.temp,v.spo2,v.weight].some(Boolean))return toast('至少填写一项');ensureDay(selected).vitals.push(v);$('vitalDialog').close();persist();toast('生命体征已记录')};
$('dailyNote').addEventListener('input',()=>{clearTimeout(noteTimer);noteTimer=setTimeout(()=>{ensureDay(selected).note={text:$('dailyNote').value.trim(),operator:cfg.operator||'家属',updatedAt:now()};persist(false);renderNote()},700)});
$('historyList').addEventListener('click',e=>{const b=e.target.closest('[data-date]');if(!b)return;selected=b.dataset.date;go('today');render()});
$('saveProfile').onclick=()=>{cfg.operator=$('operatorInput').value.trim()||'家属';state.profile={...state.profile,patientName:$('patientInput').value.trim()||'老人用药记录',room:$('roomInput').value.trim()||'住院陪护',updatedAt:now()};if(!state.operators.includes(cfg.operator))state.operators.push(cfg.operator);save(CFG,cfg);persist();toast('已保存')};
function openMed(id=''){const m=state.meds.find(x=>x.id===id);$('medDialogTitle').textContent=m?'编辑药品':'添加药品';$('medId').value=m?.id||'';$('medName').value=m?.name||'';$('medDose').value=m?.dose||'';$('medPurpose').value=m?.purpose||'';$('medNote').value=m?.note||'';$('medSchedules').value=(m?.schedules||[]).filter(s=>s.enabled!==false).map(s=>`${s.time||''} ${s.label||''}`.trim()).join('\n');$('medActive').checked=m?.active!==false;$('medConfirm').checked=!!m?.needsConfirmation;$('medDialog').showModal()}
$('addMed').onclick=()=>openMed();$('manageList').addEventListener('click',e=>{const b=e.target.closest('[data-edit]');if(b)openMed(b.dataset.edit)});$('medForm').onsubmit=e=>{e.preventDefault();const id=$('medId').value||uuid(),old=state.meds.find(m=>m.id===id),lines=$('medSchedules').value.split(/\n+/).map(x=>x.trim()).filter(Boolean),schedules=lines.map((line,i)=>{const m=line.match(/^(\d{1,2}:\d{2})\s*(.*)$/);return{id:(old?.schedules||[])[i]?.id||uuid(),time:m?m[1]:'',label:m?m[2]:line,kind:'fixed',enabled:true}}).filter(s=>s.time);const item={id,name:$('medName').value.trim(),dose:$('medDose').value.trim(),purpose:$('medPurpose').value.trim(),note:$('medNote').value.trim(),active:$('medActive').checked,needsConfirmation:$('medConfirm').checked,schedules,deleted:false,createdAt:old?.createdAt||now(),updatedAt:now()};if(!item.name)return toast('请填写药名');if(old)Object.assign(old,item);else state.meds.push(item);$('medDialog').close();persist();toast('药品已保存')};
$('importButton').onclick=()=>$('importFile').click();$('importFile').onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{const data=norm(JSON.parse(await f.text()));data.profile.updatedAt=now();data.updatedAt=now();if(!confirm(`将导入 ${data.meds.length} 种药品并与现有记录合并，继续吗？`))return;state=merge(state,data);cfg.pending=true;save(STORE,state);save(CFG,cfg);render();await syncNow('write');toast('初始化数据已导入')}catch(err){toast('导入失败：'+err.message)}finally{e.target.value=''}};
$('exportButton').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`老人用药记录-${dateKey(new Date())}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};$('logout').onclick=()=>{if(confirm('确定退出登录吗？本机缓存不会删除。'))logout(false)};
if(token())showApp();else logout(false);
})();
</script>
</body></html>
